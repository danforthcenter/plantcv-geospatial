site_name: PlantCV-Geospatial
site_url: https://plantcv-geospatial.readthedocs.io/
site_description: Plant phenotyping for geospatial images using computer vision
site_author: PlantCV Development Team
repo_url: https://github.com/danforthcenter/plantcv-geospatial
copyright: Copyright 2025, Donald Danforth Plant Science Center
theme: readthedocs

nav:
- Home: index.md
- Documentation:
  - 'Installation': installation.md
  - 'Change Log': changelog.md
  - 'Contributing':
    - 'Contributing Guide': CONTRIBUTING.md
    - 'Code of Conduct': CODE_OF_CONDUCT.md
    - 'Adding/Editing Documentation': documentation.md
  - 'PlantCV Namespace':
    - 'Geospatial Tools':
        - Reading Data:
            - Read Geo-tif Data: read_geotif.md
            - Read NetCDF Data: read_netcdf.md
        - Analysis tools: 
            - Analyze color: analyze_color.md
            - Analyze coverage: analyze_coverage.md
            - Analyze height (with percentiles): analyze_height_percentile.md
            - Analyze spectral indices: analyze_spectral_index.md
            - Analyze height (with subtraction): analyze_height_subtraction.md
        - Conversion tools:
            - Convert GeoJSON to ROI: to_roi.md
            - Convert points to/from geojson: convert_points.md
            - Convert polygons to/from geojson: convert_shapes.md
        - ROIs from polygon centers: center_grid_rois.md
        - Shape creation tools:
            - Grid from plot coordinates : shapes_grid_from_coords.md
            - Automatic Grid : shapes_grid.md
            - Interactive shape creation: InteractiveShapes.md
        - Transform coordinate polygons: transform_polygons.md
markdown_extensions:
  - toc:
      permalink: True
  - admonition
